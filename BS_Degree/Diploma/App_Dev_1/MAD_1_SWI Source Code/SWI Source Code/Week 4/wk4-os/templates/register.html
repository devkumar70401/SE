<!DOCTYPE html>
<html lang="en">
<head>
    <title>Application Form</title>
</head>
<body>
    <h2>Registration Form</h2>
    <!-- name>text, gender>MCQ, age>number, qualification>text, stream>dropdown ,address>textarea -->
     <form action="/register" method="post">
         <label for="username">Name:</label>
         <input type="text" id="username" name="name" required >

         <p>Gender:</p>
         <input type="radio" id="male" name="gender" value="Male" >
         <label for="male">Male</label>
         <input type="radio" name="gender" id="female" value="Female">
         <label for="female">Female</label>
         <input type="radio" name="gender" id="other" value="Others">
         <label for="other">Others</label><br>
          <br>
         <label for="age">Age:</label>
         <input type="number" id ="age" name="age"><br>
         <br>
         <label for="qual">Qualification:</label>
         <input type="text" id="qual" name="qual"><br>
         <br>
         <label for="str">Stream:</label>
         <select name="stream" id="str">
            <option value="Electrical">Electrical</option>
            <option value="Mechanical">Mechanical</option>
            <option value="Civil">Civil</option>
            <option value="Computer Science">Computer Science</option>
            <option value="Data Science">Data Science</option>
         </select><br>
         <br>
         <label for="add">Address:</label>
         <textarea name="address" id="add">Enter address</textarea><br>
         <br>
         <input type="submit" value="Submit">  
        </form>
    </body>
    </html>
    <!-- 1. triggers post method, 2. all the values entered in inputs gets stored in backend variable -->
